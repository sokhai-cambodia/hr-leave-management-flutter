org.gradle.jvmargs=-Xmx8G -XX:MaxMetaspaceSize=4G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true
# This newDsl flag was added by the Flutter template
android.newDsl=false
# This builtInKotlin flag was added by the Flutter template
android.builtInKotlin=false
# Kotlin's incremental compiler cache can't compute a relative path when the
# project (D:) and the pub-cache (C:) are on different Windows drives -
# "this and base files have different roots" - hit by native plugins that
# apply the Kotlin Gradle Plugin (e.g. share_plus). Disabling incremental
# compilation avoids the cross-drive relative-path bug entirely.
kotlin.incremental=false
